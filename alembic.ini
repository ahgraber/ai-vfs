# Alembic configuration for the ai-vfs SQL metadata schema.
#
# Runtime adapters use async drivers (aiosqlite / asyncpg); migrations run with a
# synchronous driver. Override the database URL via the ALEMBIC_DB_URL environment
# variable (preferred) or by editing sqlalchemy.url below. The shared Core schema in
# vfs.stores.schema is the autogenerate target, so a single migration set serves both
# the SQLite and PostgreSQL dialects.
[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url = sqlite:///./aifs.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
