# Service fixtures for ai-vfs integration tests.
#
# How to run: see tests/integration/README.md. In short, `AIVFS_INTEGRATION=1 uv run pytest
# tests/integration` brings this stack up (`compose up -d --wait`), runs the suite against it, and
# tears it down at the end — conftest.py owns the lifecycle, the service DSNs, and the bucket.
#
# What each service backs (and how the harness isolates it):
#   - postgres → test_postgres_metadata.py plus the boundary/tier suites. Tests provision a
#     per-xdist-worker database (aivfs_<suite>_<worker>) via a maintenance connection to the
#     `postgres` database, so the DSN's role needs CREATEDB; the default `aivfs` superuser has it.
#     The DSN's own database is never modified.
#   - mongo → test_mongo_metadata.py. A per-xdist-worker database is dropped before and after each
#     test, so parallel workers never clobber each other.
#   - minio → test_s3_blob.py. conftest provisions an ephemeral, per-xdist-worker bucket
#     (AIVFS_TEST_S3_BUCKET) at session start and deletes it at the end; combined with the
#     volume-less /data below, nothing persists across runs.
#
# To manage the stack by hand for inspection (then run pytest without AIVFS_INTEGRATION, or with
# AIVFS_INTEGRATION=reuse, to use it without teardown):
#
#     podman compose -f tests/integration/docker-compose.yaml up -d
#     podman compose -f tests/integration/docker-compose.yaml down -v
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aivfs
      POSTGRES_PASSWORD: aivfs
      POSTGRES_DB: aivfs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivfs -d aivfs"]
      interval: 5s
      timeout: 5s
      retries: 5
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
