# Service fixtures for ai-vfs integration tests.
#
# Postgres backs tests/integration/test_postgres_metadata.py. Start it with:
#
#     docker compose -f tests/integration/docker-compose.yml up -d postgres
#
# then point the test suite at it:
#
#     export AIVFS_TEST_POSTGRES_DSN=postgresql://aivfs:aivfs@localhost:5432/aivfs
#     uv run pytest tests/integration/test_postgres_metadata.py
#
# The tests provision a per-xdist-worker database (aivfs_test_<worker>) via a maintenance
# connection to the `postgres` database, so the role in the DSN needs CREATEDB. The
# default `aivfs` superuser below has it; the DSN's own database is never modified.
#
# Tear down with:
#
#     docker compose -f tests/integration/docker-compose.yml down -v
#
# MongoDB and MinIO services are added by their respective adapter task groups.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aivfs
      POSTGRES_PASSWORD: aivfs
      POSTGRES_DB: aivfs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivfs -d aivfs"]
      interval: 5s
      timeout: 5s
      retries: 5
